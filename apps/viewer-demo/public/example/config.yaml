viewer:
  name: Flyfish Viewer
  mode: component
  packages:
    vue3: "@file-viewer/vue3@2.2.0"
    vue2: "@file-viewer/vue2.7@2.2.0"
  lazy: true
  defaultInput: url
  toolbar:
    density: compact
    allowUpload: true
    allowUrlPreview: true
  groups:
    documents:
      label: Documents
      formats: [doc, docx, rtf, odt, ppt, pptx, pdf, ofd, typ, typst]
      defaultScale: fit-width
    drawings:
      label: Drawings
      formats: [dxf, dwg, dwf, dwfx, xps, geojson, kml, gpx, shp, excalidraw, drawio, dio]
      fallback: cad-worker-wasm-or-clear-unsupported-message
    models:
      label: 3D Models
      formats: [glb, gltf, obj, stl, ply, fbx, dae, 3ds, 3mf, amf, usd, usdz, kmz, pcd, wrl, vrml, xyz, vtk, vtp, step, stp, iges, igs, ifc, 3dm]
      renderer: three.js
    ebooks:
      label: Ebooks
      formats: [epub, umd]
      renderer: epubjs-or-umd-parser
    source:
      label: Code and Data
      renderer: highlight.js
      escapeHtml: true
      formats:
        - json
        - jsonc
        - json5
        - ipynb
        - toml
        - proto
        - hcl
        - js
        - ts
        - tsx
        - vue
        - yaml
        - sql
    assets:
      label: Assets and Data
      formats: [ttf, otf, woff, woff2, psd, ai, eps, sqlite, wasm, parquet, avro, webarchive]
  smoke:
    browser: chrome
    assertions:
      - sample-picker-closes-after-select
      - pdf-nav-can-toggle
      - model-viewer-renders-or-explains
      - code-viewer-renders-highlight
