<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page not found — Flyfish File Viewer</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: Aptos, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #eef5f1;
        color: #172033;
      }

      main {
        width: min(420px, calc(100% - 40px));
        padding: 40px;
        box-sizing: border-box;
        border: 1px solid rgba(69, 96, 87, 0.14);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 64px rgba(41, 66, 90, 0.12);
        text-align: center;
      }

      img {
        width: 48px;
        height: 48px;
      }

      h1 {
        margin: 20px 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 24px;
        color: #66736f;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        padding: 0 20px;
        border-radius: 999px;
        background: #1f966e;
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #0e1718;
          color: #edf5f2;
        }

        main {
          border-color: rgba(183, 216, 205, 0.16);
          background: rgba(20, 32, 34, 0.94);
          box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
        }

        p {
          color: #a9bbb5;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/favicon.ico" alt="Flyfish File Viewer" />
      <h1>Page not found</h1>
      <p>The address may be outdated. Return to the viewer to open or preview a file.</p>
      <a href="/">Back to File Viewer</a>
    </main>
  </body>
</html>
