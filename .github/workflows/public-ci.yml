name: Public CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: public-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, type-check, test, build and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Test thumbnail package
        run: pnpm test

      - name: Build source, components and demo
        run: pnpm build

      - name: Build documentation
        run: pnpm docs:build

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser smoke
        run: pnpm verify:browser-smoke
