<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">File Viewer social preview</title>
  <desc id="desc">File Viewer is a browser-native file preview component for internal web apps, with Office, PDF, OFD, CAD, archives, email, Vue, React, Svelte, and Web Components support.</desc>
